name: ScholarMind CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install networkx python-dotenv "pytest>=7.0" numpy scipy matplotlib

      - name: Run core tests (no API deps)
        run: |
          python -m pytest tests/test_knowledge_graph.py tests/test_graph_analyzer.py tests/test_code_execution.py -v --tb=short

      - name: Run full test suite (optional deps skip gracefully)
        run: |
          python -m pytest tests/ -v --tb=short
